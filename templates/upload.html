<!DOCTYPE html>
<html>

<head>

    <title>Upload Reports</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="top-bar">

    <h2>Upload Reports</h2>

    <a href="/admin">
        Back
    </a>

</div>

<div class="container">

    <div class="report-box">

        <h2>Upload CSV / Excel File</h2>

        <form
            method="POST"
            enctype="multipart/form-data"
        >

            <input
                type="file"
                name="file"
                required
            >
            <br><br>

<label>

    Common Tags

</label>

<textarea
    name="common_tags"
    placeholder="Enter tags separated by commas"
    required
    style="
        width:100%;
        height:120px;
        margin-top:10px;
        padding:10px;
        border-radius:10px;
    "
></textarea>

<br><br>

            <button
                type="submit"
                class="submit-btn"
            >
                Upload Reports
            </button>

        </form>

    </div>

</div>

</body>

</html>
