<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Annotation Tool Login</title>
    
    <style>
        /* Modern System Theme Profile Variables */
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #3b82f6;
            --accent-primary-hover: #2563eb;
            --accent-danger: #ef4444;
            --border-color: #475569;
            --border-focus: #3b82f6;
        }

        /* Core Structure Reset */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Top Left Corner Logo Fixed Positioning */
        .corner-logo-container {
            position: absolute;
            top: 24px;
            left: 32px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .login-logo {
            max-height: 45px;
            width: auto;
            object-fit: contain;
        }

        /* Unified Login Container Box Layout */
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            box-sizing: border-box;
        }

        .login-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            text-align: center;
            box-sizing: border-box;
        }

        .login-box h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .subtitle {
            margin: 0 0 32px 0;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Professional Inline Authentication Error Banner */
        .error-banner {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--accent-danger);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { transform: translateY(-5px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Input Form Element Component Configurations */
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        /* Corporate Form Submission Button Styles */
        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-sizing: border-box;
        }

        .login-btn:hover {
            background-color: var(--accent-primary-hover);
        }

        .login-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<!-- FIXED POSITION CORNER BRAND LOGO -->
<div class="corner-logo-container">
    <img class="login-logo" src="{{ url_for('static', filename='logo.png') }}" alt="Portal Logo">
</div>

<div class="login-container">
    <div class="login-box">

        <h1>Data Annotation Tool</h1>
        <p class="subtitle">Employee & Admin Portal Login</p>

        <!-- DYNAMIC ERROR BANNER ALERT OVERLAY TRIGGER -->
        {% if error %}
        <div class="error-banner">
            <span>⚠️</span>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- SECURE SYSTEM ENTRY ROUTING FORM -->
        <form method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username"
                    name="username" 
                    class="input-field"
                    placeholder="Enter your system username" 
                    autocomplete="username"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password"
                    name="password" 
                    class="input-field"
                    placeholder="Enter account security key" 
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="login-btn">Authenticate Entry</button>
        </form>

    </div>
</div>

</body>
</html>
